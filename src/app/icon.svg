<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="dna-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
  </defs>
  <!-- Background circle with dark slate fill and subtle border -->
  <circle cx="16" cy="16" r="15" fill="#020617" stroke="url(#dna-grad)" stroke-width="1.5" />
  
  <!-- DNA Helix Node 1 -->
  <circle cx="11" cy="9" r="2.5" fill="#06b6d4" />
  <circle cx="21" cy="9" r="2.5" fill="#d946ef" />
  <line x1="11" y1="9" x2="21" y2="9" stroke="url(#dna-grad)" stroke-width="1.5" stroke-dasharray="2 1" />
  
  <!-- DNA Helix Node 2 (crossed) -->
  <circle cx="21" cy="16" r="2.5" fill="#06b6d4" />
  <circle cx="11" cy="16" r="2.5" fill="#d946ef" />
  <line x1="11" y1="16" x2="21" y2="16" stroke="url(#dna-grad)" stroke-width="1.5" stroke-dasharray="2 1" />
  
  <!-- DNA Helix Node 3 -->
  <circle cx="11" cy="23" r="2.5" fill="#06b6d4" />
  <circle cx="21" cy="23" r="2.5" fill="#d946ef" />
  <line x1="11" y1="23" x2="21" y2="23" stroke="url(#dna-grad)" stroke-width="1.5" stroke-dasharray="2 1" />

  <!-- Connecting curves to form double helix -->
  <path d="M 11 9 Q 16 12.5 21 16 T 11 23" fill="none" stroke="#06b6d4" stroke-width="1.5" />
  <path d="M 21 9 Q 16 12.5 11 16 T 21 23" fill="none" stroke="#d946ef" stroke-width="1.5" />
</svg>
